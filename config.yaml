tfs:
  url: "${TFS_URL}"
  api_version: "7.2-preview"
  timeout_seconds: 30
  verify_ssl: false
  projects: []

sync:
  interval_hours: 6
  default_period_days: 180

server:
  host: "0.0.0.0"
  port: "${PORT}"

database:
  path: "data/pulse.db"

logging:
  level: "${LOG_LEVEL}"
  file: "logs/app.log"
